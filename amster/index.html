*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#052231;color:#fff;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:22px;overflow:hidden}
.bgg{position:fixed;inset:0;background-image:linear-gradient(rgba(141,124,224,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(141,124,224,.07) 1px,transparent 1px);background-size:38px 38px;mask-image:radial-gradient(ellipse 70% 60% at 50% 45%,#000,transparent)}
.glw{position:fixed;top:50%;left:50%;width:620px;height:620px;margin:-310px 0 0 -310px;border-radius:50%;background:radial-gradient(circle,rgba(107,92,196,.3),transparent 62%);filter:blur(34px);animation:flt 9s ease-in-out infinite}
@keyframes flt{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.bx{position:relative;z-index:2;width:100%;max-width:390px;text-align:center}
.orb{width:92px;height:92px;border-radius:50%;margin:0 auto;position:relative;background:radial-gradient(circle at 34% 30%,#8d7ce0,#4a3f8f 52%,#241d52);box-shadow:0 0 0 1px rgba(141,124,224,.3),0 0 44px rgba(107,92,196,.5),0 0 100px rgba(74,63,143,.32);animation:brt 3.4s ease-in-out infinite}
.orb::before{content:'';position:absolute;top:15%;left:21%;width:26%;height:20%;border-radius:50%;background:rgba(255,255,255,.45);filter:blur(4px)}
.orb i{position:absolute;inset:-13px;border-radius:50%;border:1px solid rgba(141,124,224,.22);animation:rip 3.6s ease-out infinite}
.orb i:nth-child(2){animation-delay:1.8s}

@keyframes rip{0%{transform:scale(.86);opacity:.8}100%{transform:scale(1.45);opacity:0}}
.wm{font-family:'Barlow Condensed',sans-serif;font-size:37px;font-weight:700;letter-spacing:.22em;margin-top:19px;line-height:1}
.sl{font-size:9px;letter-spacing:.19em;text-transform:uppercase;color:#8d7ce0;margin-top:4px}

.sub{font-size:13px;color:#7fa8bf;margin-top:5px}

form{margin-top:24px;display:flex;gap:7px}

input::placeholder{color:#5d7d90;letter-spacing:.04em}
input:focus{outline:0;border-color:#8d7ce0;background:rgba(141,124,224,.1);box-shadow:0 0 0 3px rgba(107,92,196,.16)}
button{padding:13px 20px;border:0;border-radius:9px;background:#4a3f8f;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;cursor:pointer;transition:.18s;white-space:nowrap}
button:hover{background:#6b5cc4;transform:translateY(-1px)}
button:disabled{opacity:.55;cursor:wait;transform:none}
.err{color:#e8837a;font-size:12.5px;margin-top:11px;min-height:17px;transition:.2s}
.hint{font-size:11.5px;color:#4e6675;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.09);line-height:1.6}
.hint b{color:#7fa8bf}
